<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto - Roldan Games</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="shortcut icon" href="../utils/game_icon.png" type="image/x-icon">
</head>
<body class="bg-gray-900 text-white font-sans min-h-screen flex items-center justify-center p-4">
    <!-- Formulario con estilo coincidente -->
    <div class="bg-gray-800 rounded-xl border-2 border-green-400 shadow-lg w-full max-w-md p-8 mt-16">
        <h2 class="text-3xl font-bold text-center text-green-400 mb-6">Contacto</h2>
        
        <form id="contactForm" class="space-y-6">
            <div>
                <label for="nombre" class="block text-sm font-medium text-gray-300 mb-1">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 text-white">
                <p id="nombreError" class="text-red-400 text-xs mt-1 hidden">Por favor ingrese su nombre</p>
            </div>
            
            <div>
                <label for="numero" class="block text-sm font-medium text-gray-300 mb-1">Número telefónico</label>
                <input type="tel" id="numero" name="numero" required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 text-white">
                <p id="numeroError" class="text-red-400 text-xs mt-1 hidden">Por favor ingrese un número válido</p>
            </div>
            
            <div>
                <label for="correo" class="block text-sm font-medium text-gray-300 mb-1">Correo electrónico</label>
                <input type="email" id="correo" name="correo" required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 text-white">
                <p id="correoError" class="text-red-400 text-xs mt-1 hidden">Por favor ingrese un correo válido</p>
            </div>
            
            <div>
                <label for="comentario" class="block text-sm font-medium text-gray-300 mb-1">Deja un comentario</label>
                <textarea id="comentario" name="comentario" rows="3" required
                    class="w-full px-3 py-2 bg-gray-700 border border-gray-600 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 text-white"></textarea>
                <p id="comentarioError" class="text-red-400 text-xs mt-1 hidden">Por favor ingrese un comentario</p>
            </div>
            
            <div>
                <button type="submit" 
                    class="w-full bg-green-400 text-black font-semibold py-2 px-4 rounded-md hover:bg-green-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:ring-offset-2 transition-colors">
                    Enviar
                </button>
            </div>
        </form>
        
        <div id="confirmacion" class="hidden mt-4 p-4 bg-green-900 text-green-300 rounded-md text-center">
            ¡Formulario enviado con éxito!
        </div>

        <!-- Botón para volver a la página principal -->
        <div class="mt-6 text-center">
            <a href="../index.html" class="text-green-400 hover:text-green-300 font-medium">
                ← Volver a la página principal
            </a>
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Reiniciar mensajes de error
            document.querySelectorAll('.text-red-400').forEach(elem => elem.classList.add('hidden'));
            
            // Validar campos
            let isValid = true;
            
            // Nombre
            if (!document.getElementById('nombre').value.trim()) {
                document.getElementById('nombreError').classList.remove('hidden');
                isValid = false;
            }
            
            // Número telefónico
            const numeroValue = document.getElementById('numero').value.trim();
            if (!numeroValue || !/^[0-9]{10}$/.test(numeroValue)) {
                document.getElementById('numeroError').classList.remove('hidden');
                isValid = false;
            }
            
            // Correo electrónico
            const correoValue = document.getElementById('correo').value.trim();
            if (!correoValue || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(correoValue)) {
                document.getElementById('correoError').classList.remove('hidden');
                isValid = false;
            }
            
            // Comentario
            if (!document.getElementById('comentario').value.trim()) {
                document.getElementById('comentarioError').classList.remove('hidden');
                isValid = false;
            }
            
            // Si todo es válido, mostrar confirmación
            if (isValid) {
                document.getElementById('contactForm').reset();
                document.getElementById('confirmacion').classList.remove('hidden');
                
                // Ocultar mensaje de confirmación después de 3 segundos
                setTimeout(() => {
                    document.getElementById('confirmacion').classList.add('hidden');
                }, 3000);
            }
        });
    </script>
</body>
</html>
