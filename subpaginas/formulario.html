<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Contacto</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="bg-white rounded-lg shadow-lg w-full max-w-md p-6">
        <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Formulario de Contacto</h2>
        
        <form id="contactForm" class="space-y-6">
            <div>
                <label for="nombre" class="block text-sm font-medium text-gray-700 mb-1">Nombre completo</label>
                <input type="text" id="nombre" name="nombre" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <p id="nombreError" class="text-red-500 text-xs mt-1 hidden">Por favor ingrese su nombre</p>
            </div>
            
            <div>
                <label for="numero" class="block text-sm font-medium text-gray-700 mb-1">Número telefónico</label>
                <input type="tel" id="numero" name="numero" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <p id="numeroError" class="text-red-500 text-xs mt-1 hidden">Por favor ingrese un número válido</p>
            </div>
            
            <div>
                <label for="correo" class="block text-sm font-medium text-gray-700 mb-1">Correo electrónico</label>
                <input type="email" id="correo" name="correo" required
                    class="w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                <p id="correoError" class="text-red-500 text-xs mt-1 hidden">Por favor ingrese un correo válido</p>
            </div>
            
            <div>
                <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 px-4 rounded-md hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-colors">
                    Enviar
                </button>
            </div>
        </form>
        
        <div id="confirmacion" class="hidden mt-4 p-4 bg-green-100 text-green-700 rounded-md text-center">
            ¡Formulario enviado con éxito!
        </div>
    </div>

    <script>
        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Validar campos
            let isValid = true;
            const nombre = document.getElementById('nombre').value.trim();
            const numero = document.getElementById('numero').value.trim();
            const correo = document.getElementById('correo').value.trim();
            
            if (nombre === '') {
                document.getElementById('nombreError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('nombreError').classList.add('hidden');
            }
            
            // Validar número (simple validation)
            if (numero === '' || !/^\d{8,15}$/.test(numero)) {
                document.getElementById('numeroError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('numeroError').classList.add('hidden');
            }
            
            // Validar correo
            if (correo === '' || !/\S+@\S+\.\S+/.test(correo)) {
                document.getElementById('correoError').classList.remove('hidden');
                isValid = false;
            } else {
                document.getElementById('correoError').classList.add('hidden');
            }
            
            if (isValid) {
                // Mostrar confirmación
                document.getElementById('confirmacion').classList.remove('hidden');
                
                // Reset form
                this.reset();
                
                // Ocultar confirmación después de 3 segundos
                setTimeout(function() {
                    document.getElementById('confirmacion').classList.add('hidden');
                }, 3000);
            }
        });
    </script>
</body>
</html>
